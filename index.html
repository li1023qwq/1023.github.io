<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新拟态风格地址导航</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-xyz" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-brand">地址导航</div>
        <div id="current-time"></div>
        <button id="theme-toggle">切换主题</button>
    </nav>
    <div class="container">
        <input type="text" id="search" placeholder="搜索..." />
        <ul id="address-list"></ul>
        <div id="uptime"></div>
        <div id="notification"></div>
        <div id="recommendations"></div>
        <div id="follow-us"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
